nav:
  - Главная: index.md
  - Нормативная правовая база:
      - Оценка соответствия: regulatory/conformAssess/index.md
      - Нормативные правовые акты: regulatory/draftFL/index.md
      - Стандартизация: regulatory/offersInGost/index.md
      - Экспериментально-правовой режим: ff.md
  - Библиотека стандартов:
      - ЕСКД: eskd/index.md
      - ЕСПД: espd/index.md
  - Техническая часть:
      - Сетевая модель OSI: part-tech/osi/index.md
      - Базы данных: part-tech/data-base/index.md

theme:
  name: material
  font:
    text: Roboto # Шрифт текста
    code: Roboto Mono # Шрифт для текста кода

  language: ru
  palette: # Настройки светлой и тёмной тем
    # Настройки светлой темы
    - scheme: default
      toggle:
        icon: material/weather-sunny # Иконка для активации светлой темы
        name: Выключить солнышко # Всплывающий текст-подсказка
      primary: blue grey # Основной цвет
      accent: red # Акцентный цвет
      # вы можете использовать любой цвет из списка:
      # red; pink; purple; deep purple; indigo; blue; light blue; cyan; teal;
      # green; light green; lime; yellow; amber; orange; deep orange; brown;
      # grey; blue grey; black; white

    # Настройки тёмной темы
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Позвать солнышко
      primary: blue grey
      accent: red

markdown_extensions:
  - admonition
  - codehilite
  - abbr
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
  - pymdownx.blocks.caption
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  generator: false # Убирает "Made with MkDocs"

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

plugins:
  - search
  - mkdocstrings
  - mkdocs-pdf
  - glightbox
